name = "nutriscan-worker"
main = "src/index.ts"
compatibility_date = "2026-05-01"

[vars]
# Set in Cloudflare dashboard or via wrangler secret
# HUGGINGFACE_API_KEY = ""
# HUGGINGFACE_API_TOKEN = "" # also supported
# OPENAI_API_KEY = "" # optional, enables direct meal photo macro estimation
# OPENAI_VISION_MODEL = "gpt-5.4-mini" # optional override
# USDA_API_KEY = ""
# JWT_SECRET = ""

[[d1_databases]]
binding = "DB"
database_name = "nutriscan-db"
database_id = "7e734a52-2b76-4d5a-9ff9-759351a1dd1c"

[[r2_buckets]]
binding = "IMAGES"
bucket_name = "nutriscan-images"

[env.production]
name = "nutriscan-worker"
